<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>⚡ CYBER TEST – Sécurité Numérique</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@600;900&display=swap');

    :root {
      --green:   #00ff9f;
      --green2:  #2affb6;
      --dim:     #00b36f;
      --bg:      #060d14;
      --card:    #0b1622;
      --card2:   #0f1e2d;
      --border:  #1a3a2f;
      --text:    #c8e8d8;
      --muted:   #5a8a72;
      --yellow:  #ffe666;
      --orange:  #ffaa44;
      --red:     #ff4466;
      --easy:    #44ff99;
      --medium:  #ffcc44;
      --hard:    #ff6644;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem 4rem;
      position: relative;
      overflow-x: hidden;
    }

    #matrix-bg {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index: 0; opacity: 0.06; pointer-events: none;
    }
    .terminal {
      position: relative; z-index: 1;
      max-width: 720px; width: 100%;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--green2);
      box-shadow: 0 0 30px rgba(0,255,159,0.15), 0 0 80px rgba(0,0,0,0.8);
      overflow: visible;
    }
    .progress-area {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  transition: box-shadow 0.2s, backdrop-filter 0.2s;
}
.progress-area.stuck {
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(8px);
  background: rgba(6, 13, 20, 0.92);
}
    .header {
      background: linear-gradient(135deg, #040d0a 0%, #071a12 100%);
      padding: 1.6rem 1.5rem 1.2rem;
      border-bottom: 2px solid var(--green2);
      text-align: center;
    }
    .header-bar { display: flex; gap: 8px; margin-bottom: 14px; }
    .dot { width:13px; height:13px; border-radius:50%; }
    .dot-r { background:#ff5f56; }
    .dot-y { background:#ffbd2e; }
    .dot-g { background:#27c93f; }
    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      color: var(--green);
      text-shadow: 0 0 12px var(--green), 0 0 30px rgba(0,255,159,0.3);
      letter-spacing: 3px;
    }
    .header-sub { color: var(--muted); font-size: 0.78rem; margin-top: 6px; letter-spacing: 1px; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .progress-area { padding: 18px 24px 0; background: var(--bg); }
    .progress-bar { height: 6px; background: #1a2a20; border-radius: 20px; overflow:hidden; }
    .progress-fill {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, var(--dim), var(--green));
      border-radius: 20px; transition: width 0.4s ease;
      box-shadow: 0 0 8px var(--green);
    }
    .step-counter {
      display: flex; justify-content: space-between;
      color: var(--green2); font-size: 0.72rem; margin-top: 8px; padding-bottom: 8px;
    }
    .quiz-content {
  scroll-margin-top: 80px; /* correspond à la hauteur approximative de la barre */
}
.question {
  scroll-margin-top: 85px; /* hauteur approximative de la barre sticky + marge */
}
    .quiz-content { padding: 20px 24px 28px; }
    .question { display: none; }
    .question.active { display: block; animation: slidein 0.25s ease; }
    @keyframes slidein {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .diff-badge {
      display: inline-block; padding: 2px 10px;
      border-radius: 20px; font-size: 0.7rem; font-weight: bold;
      letter-spacing: 1px; margin-bottom: 10px;
      font-family: 'Orbitron', monospace;
    }
    .diff-easy   { background: rgba(68,255,153,0.12); color: var(--easy);   border: 1px solid var(--easy); }
    .diff-medium { background: rgba(255,204,68,0.12); color: var(--medium); border: 1px solid var(--medium); }
    .diff-hard   { background: rgba(255,102,68,0.12); color: var(--hard);   border: 1px solid var(--hard); }
    .diff-info   { background: rgba(42,255,182,0.1);  color: var(--green2); border: 1px solid var(--green2); }

    .question h3 {
      font-size: clamp(0.95rem, 3vw, 1.15rem);
      color: #e0fff4;
      margin-bottom: 14px;
      padding-left: 14px;
      border-left: 3px solid var(--green2);
      line-height: 1.5;
    }

    .scenario-card {
      background: var(--card2);
      border-radius: 12px; padding: 18px;
      margin: 14px 0; border: 1px solid #1a3020;
    }
    .scenario-preview {
      background: #030a07;
      padding: 14px 16px; border-radius: 8px;
      font-size: 0.82rem; line-height: 1.6;
      border-left: 4px solid var(--orange);
      margin-bottom: 16px;
      color: #aaddcc;
      white-space: pre-wrap; word-break: break-word;
    }
    .scenario-preview .preview-label {
      color: var(--orange); font-size: 0.7rem; letter-spacing: 1px;
      display: block; margin-bottom: 8px;
      font-family: 'Orbitron', monospace;
    }
    .scenario-q { color: var(--yellow); font-size: 0.9rem; margin-bottom: 12px; }

    .options { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }

    .option {
      background: #08131e;
      border: 1px solid #1e3a2a;
      border-radius: 10px;
      touch-action: manipulation;
      padding: 12px 16px;
      display: flex; align-items: flex-start; gap: 12px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    @media (hover: hover) {
  .option:hover:not(.locked-option) {
    border-color: var(--green2);
    background: #0a1a14;
  }
}
    .option.selected {
      border-color: var(--green2);
      background: rgba(0,255,159,0.06);
      box-shadow: 0 0 10px rgba(0,255,159,0.1);
    }
    .option.locked-option { cursor: default; }
    .option input[type="radio"] {
      accent-color: var(--green);
      width: 16px; height: 16px; min-width:16px;
      margin-top: 3px; cursor: pointer;
    }
    .option label { color: #c8e8d8; font-size: 0.88rem; line-height: 1.5; cursor: pointer; flex:1; }
    .option.locked-option label { cursor: default; }

    .feedback {
      margin-top: 14px; padding: 12px 16px;
      border-radius: 10px; background: #071210;
      color: #d4ffee; font-size: 0.82rem; line-height: 1.6;
      border-left: 4px solid var(--green2); display: none;
    }
    .feedback.correct { border-left-color: var(--easy); background: rgba(68,255,153,0.05); }
    .feedback.warning { border-left-color: var(--medium); background: rgba(255,204,68,0.05); color: #ffe0a0; }
    .feedback.wrong   { border-left-color: var(--hard);   background: rgba(255,68,68,0.05);  color: #ffbbbb; }
    .lock-notice { display: none; font-size: 0.7rem; color: var(--muted); margin-top: 8px; text-align: right; letter-spacing: 1px; }

    select, input[type="text"], textarea {
      width: 100%; padding: 13px 16px;
      background: #08131e; border: 1px solid #1e3a2a;
      border-radius: 10px; color: #c8e8d8;
      font-family: 'Share Tech Mono', monospace; font-size: 0.9rem;
      margin: 14px 0 0; transition: border-color 0.2s;
    }
    select:focus, input[type="text"]:focus, textarea:focus {
      outline: none; border-color: var(--green2);
      box-shadow: 0 0 6px rgba(42,255,182,0.2);
    }
    select option { background: #0b1622; color: #c8e8d8; }
    textarea { resize: vertical; min-height: 80px; border-radius: 10px; }

    .score-chip {
      display: inline-block; padding: 3px 12px;
      background: rgba(0,255,159,0.1); border: 1px solid var(--green2);
      color: var(--green); border-radius: 20px; font-size: 0.72rem; letter-spacing: 1px;
    }

    .nav-buttons { display: flex; gap: 12px; margin-top: 28px; }
    .btn {
      background: #0c1e16; border: 1px solid #1e3a2a;
      padding: 12px 20px; border-radius: 10px;
      font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; color: #9acfb4;
      cursor: pointer; transition: 0.2s; flex:1;
    }
    .btn:hover { border-color: var(--green2); color: var(--green); filter: brightness(1.1); }
    .btn-next { background: #0a2618; border-color: var(--dim); color: var(--green); box-shadow: 0 0 8px rgba(0,255,159,0.1); }
    .btn-submit {
      width: 100%; margin-top: 16px; padding: 14px;
      background: var(--green); color: #060d14;
      border: none; border-radius: 10px;
      font-family: 'Orbitron', monospace; font-size: 0.95rem;
      font-weight: 600; cursor: pointer; letter-spacing: 2px;
      transition: 0.2s; box-shadow: 0 0 20px rgba(0,255,159,0.3);
    }
    .btn-submit:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      margin-top: 14px; padding: 12px 16px;
      border-radius: 10px; font-size: 0.85rem;
      display: none; text-align: center;
    }
    .message.success { display: block; background: rgba(0,255,159,0.1); border: 1px solid var(--green); color: #a0ffcc; }
    .message.error   { display: block; background: rgba(255,68,68,0.1);  border: 1px solid var(--red);   color: #ffaaaa; }

    /* ── SCORE SCREEN ── */
    #scoreScreen { display: none; text-align: center; padding: 30px 20px; }

    .score-big {
      font-family: 'Orbitron', monospace;
      font-size: 3.5rem; color: var(--green);
      text-shadow: 0 0 20px var(--green);
    }
    .score-label { font-size: 0.85rem; margin: 8px 0 4px; letter-spacing:2px; }
    .score-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem; margin: 8px 0 20px;
      text-shadow: 0 0 10px currentColor;
    }

    /* Section cards */
    .section-scores {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 10px; margin: 20px 0 24px; text-align: center;
    }
    @media (max-width: 480px) {
      .section-scores { grid-template-columns: 1fr; }
    }
    .section-card {
      background: #081412; border: 1px solid #1a3020;
      border-radius: 12px; padding: 14px 10px;
    }
    .section-card .sc-icon { font-size: 1.4rem; margin-bottom: 6px; }
    .section-card .sc-label {
      font-family: 'Orbitron', monospace; font-size: 0.62rem;
      color: var(--muted); letter-spacing: 1px; margin-bottom: 8px;
    }
    .section-card .sc-score {
      font-size: 1.3rem; font-weight: bold;
    }
    .section-card .sc-badge {
      font-size: 0.68rem; color: var(--muted);
      margin-top: 5px; letter-spacing: 0.5px;
      line-height: 1.3;
    }
    .sc-bar-bg { height: 4px; background: #1a2a20; border-radius: 20px; margin: 8px 0 4px; overflow:hidden; }
    .sc-bar-fill { height: 100%; border-radius: 20px; transition: width 0.6s ease; }

    .score-breakdown { text-align:left; margin-top:4px; }
    .sb-section-header {
      font-family: 'Orbitron', monospace;
      font-size: 0.68rem; letter-spacing: 2px;
      color: var(--muted); padding: 10px 12px 4px;
      border-top: 1px solid #0f2018; margin-top: 8px;
    }
    .sb-section-header:first-child { border-top: none; margin-top: 0; }
    .score-breakdown .sb-item {
      display:flex; justify-content:space-between; align-items:center;
      padding: 7px 12px; border-radius:8px; margin-bottom:4px;
      background: #081412; font-size:0.80rem; color: #a0c8b8;
    }
    .sb-item .sb-q { flex:1; padding-right:8px; line-height:1.4; }
    .sb-pts { white-space:nowrap; font-weight:bold; }
    .sb-correct { color: var(--easy); }
    .sb-partial  { color: var(--medium); }
    .sb-wrong   { color: var(--hard); }

    footer {
      text-align: center; font-size: 0.68rem;
      color: #2a4a3a; padding: 14px;
      border-top: 1px solid #0f2018; letter-spacing: 1px;
    }
    /* Animation d’apparition du score */
@keyframes scorePop {
  0% { transform: scale(0.8); opacity: 0; text-shadow: 0 0 0 var(--green); }
  80% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; text-shadow: 0 0 20px var(--green); }
}
.score-big {
  animation: scorePop 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
}

/* Animation des cartes section */
.section-card {
  animation: fadeSlideUp 0.5s ease-out forwards;
  opacity: 0;
  transform: translateY(15px);
}
.section-card:nth-child(1) { animation-delay: 0.1s; }
.section-card:nth-child(2) { animation-delay: 0.2s; }
.section-card:nth-child(3) { animation-delay: 0.3s; }
@keyframes fadeSlideUp {
  to { opacity: 1; transform: translateY(0); }
}

/* Indicateur swipe up */
.swipe-indicator {
  margin: 28px auto 15px;
  text-align: center;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.swipe-arrow {
  font-size: 1.8rem;
  animation: bounceUp 1.2s infinite ease;
  display: inline-block;
}
.swipe-text {
  font-size: 0.7rem;
  letter-spacing: 2px;
  color: var(--muted);
  font-family: 'Orbitron', monospace;
  background: rgba(0,255,159,0.1);
  padding: 4px 12px;
  border-radius: 30px;
  backdrop-filter: blur(2px);
}
@keyframes bounceUp {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.swipe-indicator:hover .swipe-arrow {
  transform: translateY(-3px);
  text-shadow: 0 0 8px var(--green);
}

/* Carte remerciement + conseil */
.thankyou-card {
  background: linear-gradient(135deg, #0b1a14, #07120e);
  border: 1px solid var(--green2);
  border-radius: 20px;
  padding: 18px 20px;
  margin-top: 15px;
  text-align: left;
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.6s ease-out, opacity 0.4s ease, margin 0.3s;
  box-shadow: 0 0 15px rgba(0,255,159,0.1);
}
.thankyou-card.open {
  max-height: 500px;   /* assez grand pour le contenu */
  opacity: 1;
  margin-top: 20px;
}
.thankyou-title {
  font-family: 'Orbitron', monospace;
  color: var(--green);
  font-size: 1rem;
  letter-spacing: 2px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.thankyou-message {
  color: var(--text);
  font-size: 0.85rem;
  line-height: 1.5;
  margin-bottom: 15px;
}
.hacker-tip {
  background: #030a07;
  border-left: 3px solid var(--orange);
  padding: 12px 14px;
  border-radius: 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.78rem;
  color: #ffe0aa;
}
/* MODAL POPUP */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(5px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s;
}
.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}
.modal-content {
  background: linear-gradient(135deg, #0b1a14, #07120e);
  border: 1px solid var(--green2);
  border-radius: 24px;
  max-width: 90%;
  width: 400px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px 20px;
  box-shadow: 0 0 40px rgba(0, 255, 159, 0.3);
  transform: scale(0.9);
  transition: transform 0.2s ease;
}
.modal-overlay.active .modal-content {
  transform: scale(1);
}
.modal-close {
  position: absolute;
  top: 15px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
  color: var(--muted);
  transition: color 0.2s;
  font-family: monospace;
}
.modal-close:hover {
  color: var(--green);
}
.modal-title {
  font-family: 'Orbitron', monospace;
  color: var(--green);
  font-size: 1.2rem;
  letter-spacing: 2px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.modal-message {
  color: var(--text);
  font-size: 0.9rem;
  line-height: 1.5;
  margin-bottom: 20px;
}
.modal-tip {
  background: #030a07;
  border-left: 3px solid var(--orange);
  padding: 14px 16px;
  border-radius: 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  color: #ffe0aa;
}
.modal-tip strong {
  color: var(--green2);
}
.hacker-tip strong {
  color: var(--green2);
  font-weight: normal;
}
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #1a3a2a; border-radius: 3px; }
  </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="terminal">
  <div class="header">
    <div class="header-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <h1>[ CYBER_TEST v2.0 ]<span class="blink">_</span></h1>
    <div class="header-sub">// Évalue tes habitudes numériques réelles • 100% anonyme</div>
  </div>

  <div class="progress-area">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="step-counter">
      <span id="stepCounter">Question 1 / ?</span>
      <span id="scoreChip" class="score-chip">Score: 0 pts</span>
    </div>
  </div>

  <div class="quiz-content">
    <div id="questionsContainer"></div>
    <div id="scoreScreen"></div>

    <div class="nav-buttons" id="navButtons">
      <button class="btn" id="prevBtn" style="display:none;">◀ RETOUR</button>
      <button class="btn btn-next" id="nextBtn">SUIVANT ▶</button>
    </div>
    <div id="submitContainer" style="display:none;">
      <button class="btn-submit" id="submitBtn">📡 ENVOYER MES RÉPONSES</button>
    </div>
    <div id="messageBox" class="message"></div>
  </div>

  <footer>🔒 Aucune donnée personnelle identifiable • Réponses utilisées à des fins de prévention</footer>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1bqtZpbDhMl7AZkYu4MF_geG9vFBYmkaOmivb4-9LW2sbCeHvjJJNkF6ldLmBCPEtbA/exec";

// ═══════════════════════════════════════════════════════
//  SECTION METADATA
// ═══════════════════════════════════════════════════════
// theme values: "osint" | "physique" | "logiciel"
// Each theme has its own title ladder based on % score.

const SECTION_META = {
  osint: {
    icon: "🕵️",
    label: "EXPOSITION / OSINT",
    color: "#c084fc",   // purple
    barColor: "#a855f7",
    titles: [
      { min: 90, title: "Fantôme Numérique",   desc: "Empreinte quasi inexistante. Introuvable." },
      { min: 70, title: "Discret·e",           desc: "Bonne maîtrise de ton exposition en ligne." },
      { min: 45, title: "Visible",             desc: "Quelques failles d'exposition à corriger." },
      { min: 0,  title: "Livre Ouvert",        desc: "Ton profil public est un manuel OSINT." }
    ]
  },
  physique: {
    icon: "🔒",
    label: "SÉCURITÉ PHYSIQUE",
    color: "#38bdf8",   // sky blue
    barColor: "#0ea5e9",
    titles: [
      { min: 90, title: "Agent de Terrain",    desc: "Aucun appareil laissé accessible sans raison." },
      { min: 70, title: "Vigilant·e",          desc: "Tu sécurises bien tes appareils en public." },
      { min: 45, title: "Distrait·e",          desc: "Quelques habitudes physiques à revoir." },
      { min: 0,  title: "Porte Ouverte",       desc: "Tes appareils sont facilement accessibles." }
    ]
  },
  logiciel: {
    icon: "💻",
    label: "HYGIÈNE LOGICIELLE",
    color: "#34d399",   // green
    barColor: "#10b981",
    titles: [
      { min: 90, title: "Analyste Sécurité",   desc: "Mots de passe forts, MAJ à jour, méfiance active." },
      { min: 70, title: "Utilisateur Averti",  desc: "Bonnes pratiques appliquées au quotidien." },
      { min: 45, title: "Intermédiaire",       desc: "Des bons réflexes mais des angles morts." },
      { min: 0,  title: "Exposé·e",            desc: "Habitudes numériques à revoir en profondeur." }
    ]
  }
};

// Global title based on overall %
const GLOBAL_TITLES = [
  { min: 90, title: "🏆 OPSEC Expert",           color: "var(--easy)",   desc: "Tes pratiques dépassent la plupart des professionnels. Modèle à suivre." },
  { min: 75, title: "🛡️ Cyber-Résilient·e",     color: "var(--green)",  desc: "Solide sur les trois piliers. Quelques angles morts à polir." },

let answers  = Array(questions.length).fill(null);
let locked   = Array(questions.length).fill(false);
let score    = 0;
let currentIndex = 0;

// Per-section running scores
const sectionScore = { osint: 0, physique: 0, logiciel: 0 };

const container       = document.getElementById("questionsContainer");

const nextBtn         = document.getElementById("nextBtn");

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function getSectionMax(theme) {
  return questions
    .filter(q => q.type === "scenario" && q.theme === theme)
    .reduce((acc, q) => acc + Math.max(...q.scores), 0);
}
function getTotalMax() {
  return questions
    .filter(q => q.type === "scenario")
    .reduce((acc, q) => acc + Math.max(...q.scores), 0);
}
function getTitleForPct(pct, ladder) {
  return ladder.find(t => pct >= t.min) || ladder[ladder.length - 1];
}
// Mélange aléatoire d'un tableau (Fisher-Yates)
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
// ═══════════════════════════════════════════════════════
//  BUILD HTML
// ═══════════════════════════════════════════════════════
function diffLabel(d) {
  const map = {
    easy:   ['diff-easy',   '🟢 FACILE'],
    medium: ['diff-medium', '🟡 INTERMÉDIAIRE'],
    hard:   ['diff-hard',   '🔴 DIFFICILE'],
    info:   ['diff-info',   '📋 INFO']
  };
  const [cls, label] = map[d] || map.info;
  return `<span class="diff-badge ${cls}">${label}</span>`;
}
function esc(s) {
  if (!s) return "";
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function buildQuestionHTML(q, idx) {
  let h = `<div class="question" id="q_${idx}" data-qidx="${idx}">`;
  h += diffLabel(q.diff);
  h += `<h3>${q.text}</h3>`;

  if (q.type === "radio") {
  let optionsIndices;
  if (shouldShuffle(q)) {
    const originalIndices = q.options.map((_, i) => i);
    optionsIndices = shuffleArray([...originalIndices]);
  } else {
    optionsIndices = q.options.map((_, i) => i); // ordre original
  }
  h += `<div class="options" id="opts_${idx}">`;
  optionsIndices.forEach(origIdx => {
    const opt = q.options[origIdx];
    const chk = answers[idx] === opt ? "checked" : "";
    h += `<div class="option${answers[idx] === opt ? ' selected' : ''}${locked[idx] ? ' locked-option' : ''}" data-original-idx="${origIdx}">
            <input type="radio" name="q_${idx}" value="${esc(opt)}" id="q_${idx}_${origIdx}" ${chk} ${locked[idx] ? 'disabled' : ''}>
            <label for="q_${idx}_${origIdx}">${esc(opt)}</label>
          </div>`;
  });
  h += `</div>`;
}
  else if (q.type === "select") {
  let optionsIndices;
  if (shouldShuffle(q)) {
    const originalIndices = q.options.map((_, i) => i);
    optionsIndices = shuffleArray([...originalIndices]);
  } else {
    optionsIndices = q.options.map((_, i) => i);
  }
  h += `<select id="select_${idx}">`;
  optionsIndices.forEach(origIdx => {
    const opt = q.options[origIdx];
    const sel = answers[idx] === opt ? "selected" : "";
    h += `<option value="${esc(opt)}" ${sel}>${esc(opt)}</option>`;
  });
  h += `</select>`;
}
  else if (q.type === "comment") {
    h += `<textarea id="comment_${idx}" rows="4" placeholder="Ton retour, suggestion, ou expérience personnelle…">${answers[idx] || ''}</textarea>`;
  } 
  else if (q.type === "scenario") {
    const originalIndices = q.options.map((_, i) => i);
    const shuffledIndices = shuffleArray([...originalIndices]);
    h += `<div class="scenario-card">
            <div class="scenario-preview"><span class="preview-label">// SITUATION</span>${esc(q.preview).replace(/\n/g,'<br>')}</div>
            <div class="scenario-q">🤔 ${esc(q.question)}</div>
            <div class="options" id="opts_${idx}">`;
    shuffledIndices.forEach(origIdx => {
      const opt = q.options[origIdx];
      const chk  = answers[idx] === opt ? "checked" : "";
      const selC = answers[idx] === opt ? " selected" : "";
      const lkC  = locked[idx] ? " locked-option" : "";
      h += `<div class="option${selC}${lkC}" data-original-idx="${origIdx}">
              <input type="radio" name="q_${idx}" value="${esc(opt)}" id="q_${idx}_${origIdx}" ${chk} ${locked[idx] ? 'disabled' : ''}>
              <label for="q_${idx}_${origIdx}">${esc(opt)}</label>
            </div>`;
    });
    let fbStyle = "display:none;", fbClass = "", fbText = "";
    if (locked[idx] && answers[idx] !== null) {
      const origIdx = q.options.indexOf(answers[idx]);
      if (origIdx >= 0) { const fb = q.feedbacks[origIdx]; fbStyle="display:block;"; fbClass=fb.type; fbText=`💡 ${esc(fb.text)}`; }
    }
    h += `</div>
          <div class="feedback ${fbClass}" id="fb_${idx}" style="${fbStyle}">${fbText}</div>
          <div class="lock-notice" id="ln_${idx}" style="${locked[idx]?'display:block;':''}">🔒 Réponse enregistrée</div>
        </div>`;
  }
  h += `</div>`;
  return h;
}

// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════
function bindEvents() {
  questions.forEach((q, idx) => {
    if (q.type === "radio") {
      document.querySelectorAll(`#q_${idx} .option`).forEach(div => {
        const radio = div.querySelector('input');
        if (!radio) return;
        radio.addEventListener('change', () => {
          answers[idx] = radio.value;
          document.querySelectorAll(`#q_${idx} .option`).forEach(o => o.classList.remove('selected'));
          div.classList.add('selected');
          scrollToActionArea();
        });
        if (radio.checked) div.classList.add('selected');
      });
    } 
    else if (q.type === "select") {
      const sel = document.getElementById(`select_${idx}`);
      if (sel) {
        if (!answers[idx]) answers[idx] = sel.value;
        sel.addEventListener('change', () => {
          answers[idx] = sel.value;
          scrollToActionArea();
        });
      }
    } 
    else if (q.type === "comment") {
      const txt = document.getElementById(`comment_${idx}`);
      if (txt) txt.addEventListener('input', () => { answers[idx] = txt.value; });
    } 
    else if (q.type === "scenario") {
      const optDivs    = document.querySelectorAll(`#q_${idx} .option`);
      const feedbackEl = document.getElementById(`fb_${idx}`);
      const lockNotice = document.getElementById(`ln_${idx}`);
      optDivs.forEach(div => {
        const radio = div.querySelector('input');
        if (!radio) return;
        const originalIdx = parseInt(div.getAttribute('data-original-idx'));
        if (radio.checked) div.classList.add('selected');
        radio.addEventListener('change', () => {
          if (locked[idx]) return;
          const fb = q.feedbacks[originalIdx];
          answers[idx] = radio.value;
          const pts = q.scores[originalIdx];
          score += pts;
          if (q.theme) sectionScore[q.theme] += pts;
          updateScoreChip();
          locked[idx] = true;
          optDivs.forEach(od => { od.classList.add('locked-option'); const r = od.querySelector('input'); if(r) r.disabled = true; });
          optDivs.forEach(o => o.classList.remove('selected'));
          div.classList.add('selected');
          if (feedbackEl) { feedbackEl.innerHTML = `💡 ${esc(fb.text)}`; feedbackEl.className = `feedback ${fb.type}`; feedbackEl.style.display = "block"; }
          if (lockNotice) lockNotice.style.display = "block";
          scrollToActionArea();
        });
      });
    }
  });
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
function showQuestion(idx) {
  document.querySelectorAll('.question').forEach(q => q.classList.remove('active'));
  const el = document.getElementById(`q_${idx}`);
  if (el) el.classList.add('active');
  scrollToActiveQuestion();
  const pct = ((idx + 1) / questions.length) * 100;
  progressFill.style.width = `${pct}%`;
  stepCounterSpan.textContent = `Question ${idx + 1} / ${questions.length}`;
  prevBtn.style.display = idx === 0 ? 'none' : 'block';
  const isLast = idx === questions.length - 1;
  nextBtn.style.display         = isLast ? 'none' : 'block';
  submitContainer.style.display = isLast ? 'block' : 'none';
  messageBox.style.display      = 'none';
}
function shouldShuffle(question) {
  return question.id !== "genre" && question.id !== "filiere";
}
function saveInput() {
  const q = questions[currentIndex];
  if (!q) return;
  if (q.type === "radio") {
    const sel = document.querySelector(`#q_${currentIndex} input[type="radio"]:checked`);
    if (sel) answers[currentIndex] = sel.value;
  } else if (q.type === "select") {
    const s = document.getElementById(`select_${currentIndex}`);
    if (s) answers[currentIndex] = s.value;
  } else if (q.type === "comment") {
    const t = document.getElementById(`comment_${currentIndex}`);
    if (t) answers[currentIndex] = t.value;
  }
}

function nextStep() {
  saveInput();
  const q = questions[currentIndex];
  if (q.type !== "comment" && !answers[currentIndex]) { showMsg("🔐 Réponds à cette question avant de continuer !", "error"); return; }
  if (q.type === "scenario" && !locked[currentIndex]) { showMsg("🔐 Sélectionne une réponse pour voir le feedback avant de continuer.", "error"); return; }
  if (currentIndex < questions.length - 1) { currentIndex++; showQuestion(currentIndex); }
}

function prevStep() {
  saveInput();
  if (currentIndex > 0) { currentIndex--; showQuestion(currentIndex); }
}

function showMsg(msg, type) {
  messageBox.textContent = msg;
  messageBox.className = `message ${type}`;
  messageBox.style.display = 'block';
  setTimeout(() => { messageBox.style.display = 'none'; }, 3500);
}

function updateScoreChip() {
  scoreChip.textContent = `Score: ${score} / ${getTotalMax()}`;
}
function scrollToActiveQuestion() {
  // Attend un court instant que le DOM soit mis à jour
  setTimeout(() => {
    const activeQuestion = document.querySelector('.question.active');
    if (activeQuestion) {
      activeQuestion.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      // Fallback : remonter au début du contenu du quiz
      const quizContent = document.querySelector('.quiz-content');
      if (quizContent) quizContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 100); // léger délai pour laisser le temps à l’animation CSS
}
function scrollToActionArea() {
  setTimeout(() => {
    const nextBtn = document.getElementById('nextBtn');
    const submitContainer = document.getElementById('submitContainer');
    // Affiche le bouton "SUIVANT" s'il est visible, sinon le conteneur d'envoi
    let target = null;
    if (nextBtn && nextBtn.style.display !== 'none') {
      target = nextBtn;
    } else if (submitContainer && submitContainer.style.display === 'block') {
      target = submitContainer;
    }
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else {
      // Fallback : pied du contenu du quiz
      const quizContent = document.querySelector('.quiz-content');
      if (quizContent) quizContent.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
  }, 150);
}
function handleProgressSticky() {
  const progressArea = document.querySelector('.progress-area');
  if (!progressArea) return;
  const rect = progressArea.getBoundingClientRect();
  const isStuck = rect.top <= 0;
  if (isStuck) {
    progressArea.classList.add('stuck');
  } else {
    progressArea.classList.remove('stuck');
  }
}
// ═══════════════════════════════════════════════════════
//  SUBMIT
// ═══════════════════════════════════════════════════════
async function submitAll() {
  saveInput();
  for (let i = 0; i < questions.length; i++) {
    if (questions[i].type !== "comment" && !answers[i]) {
      currentIndex = i; showQuestion(i);
      showMsg(`⚠️ Question ${i + 1} sans réponse`, "error"); return;
    }
  }
  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true; submitBtn.textContent = "📡 ENVOI EN COURS…";

  // Récupère toutes les réponses par ID
  const payload = {};
  questions.forEach((q, i) => { payload[q.id] = answers[i] || ""; });

  // Ajoute les scores
  const totalMax = getTotalMax();
  payload.score = `${score}/${totalMax}`;
  payload.score_osint    = `${sectionScore.osint}/${getSectionMax('osint')}`;
  payload.score_physique = `${sectionScore.physique}/${getSectionMax('physique')}`;
  payload.score_logiciel = `${sectionScore.logiciel}/${getSectionMax('logiciel')}`;
  payload.timestamp = new Date().toISOString();

  // Liste des IDs de questions "scénario" qui doivent exister dans le payload
  // (au cas où certaines n'auraient pas été remplies par la boucle précédente)
  const requiredScenarioIds = [
    "q_email_phishing", "q_reseaux_sociaux", "q_localisation", "q_osint_identite",
    "q_partage_contact", "q_ecran_verrouille", "q_shoulder_surfing", "q_usb",
    "q_telephone_oublie", "q_appareil_prete", "q_mdp_facile", "q_wifi_public",
    "q_mises_a_jour", "q_2fa", "q_url", "q_telechargement", "q_https_mythe",
    "q_ingenierie_sociale", "q_vpn_mythe", "q_mdp_reutilise"
  ];
  // S'assurer que chaque champ existe (même vide)
  requiredScenarioIds.forEach(id => {
    if (payload[id] === undefined) payload[id] = "";
  });

  // Champs info supplémentaires (démographie, commentaire)
  const infoIds = ["genre", "filiere", "gestionnaire_mdp", "commentaire"];
  infoIds.forEach(id => {
    if (payload[id] === undefined) payload[id] = "";
  });

  try {
    await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    showFinalScreen();
  } catch (e) {
    showMsg("❌ Erreur réseau. Réessaie.", "error");
    submitBtn.disabled = false; submitBtn.textContent = "📡 ENVOYER MES RÉPONSES";
  }
}
// ═══════════════════════════════════════════════════════
//  FINAL SCREEN
// ═══════════════════════════════════════════════════════
function showFinalScreen() {
  document.getElementById("questionsContainer").style.display = "none";
  document.getElementById("navButtons").style.display = "none";
  submitContainer.style.display = "none";
  messageBox.style.display = "none";

  const totalMax = getTotalMax();
  const totalPct = Math.round((score / totalMax) * 100);
  const globalTitle = getTitleForPct(totalPct, GLOBAL_TITLES);

  const themes = ['osint', 'physique', 'logiciel'];
  let sectionCardsHTML = '<div class="section-scores">';
  themes.forEach(theme => {
    const meta  = SECTION_META[theme];
    const max   = getSectionMax(theme);
    const pts   = sectionScore[theme];
    const pct   = max > 0 ? Math.round((pts / max) * 100) : 0;
    const title = getTitleForPct(pct, meta.titles);
    sectionCardsHTML += `
      <div class="section-card">
        <div class="sc-icon">${meta.icon}</div>
        <div class="sc-label">${meta.label}</div>
        <div class="sc-score" style="color:${meta.color}">${pts}<span style="font-size:0.8rem;color:var(--muted)">/${max}</span></div>
        <div class="sc-bar-bg"><div class="sc-bar-fill" style="width:${pct}%;background:${meta.barColor}"></div></div>
        <div class="sc-badge" style="color:${meta.color}">${title.title}</div>
        <div class="sc-badge" style="color:var(--muted);font-size:0.62rem">${title.desc}</div>
      </div>`;
  });
  sectionCardsHTML += '</div>';

  const themeLabels = { osint: '🕵️ EXPOSITION / OSINT', physique: '🔒 SÉCURITÉ PHYSIQUE', logiciel: '💻 HYGIÈNE LOGICIELLE' };
  let breakdown = '';
  themes.forEach(theme => {
    const qs = questions.filter(q => q.type === "scenario" && q.theme === theme);
    if (!qs.length) return;
    breakdown += `<div class="sb-section-header">${themeLabels[theme]}</div>`;
    qs.forEach(q => {
      const qi        = questions.indexOf(q);
      const chosenIdx = q.options.indexOf(answers[qi]);
      const pts       = chosenIdx >= 0 ? (q.scores[chosenIdx] || 0) : 0;
      const maxPts    = Math.max(...q.scores);
      const pctQ      = maxPts > 0 ? pts / maxPts : 0;
      const cls       = pctQ >= 0.9 ? 'sb-correct' : pctQ >= 0.5 ? 'sb-partial' : 'sb-wrong';
      const label     = q.text.replace(/^[^\w]+ /, '').replace(/\[.*?\]\s*/, '').substring(0, 50);
      breakdown += `<div class="sb-item">
        <span class="sb-q">${label}…</span>
        <span class="sb-pts ${cls}">${pts}/${maxPts}</span>
      </div>`;
    });
  });

  const screen = document.getElementById("scoreScreen");
  screen.innerHTML = `
    <div class="score-big">${score}<span style="font-size:1.8rem;color:var(--muted)">/${totalMax}</span></div>
    <div class="score-label" style="color:${globalTitle.color}">${totalPct}% — ${globalTitle.title}</div>
    <div style="color:var(--muted);font-size:0.78rem;margin-bottom:20px;line-height:1.5">${globalTitle.desc}</div>
    ${sectionCardsHTML}
    <p style="color:var(--muted);font-size:0.72rem;margin-bottom:10px;letter-spacing:1px;">// DÉTAIL PAR QUESTION</p>
    <div class="score-breakdown">${breakdown}</div>
  `;
  screen.style.display = "block";
  progressFill.style.width = "100%";

  // Créer le modal s'il n'existe pas
  if (!document.getElementById('thankyouModal')) {
    const modalHTML = `
      <div id="thankyouModal" class="modal-overlay">
        <div class="modal-content">
          <div class="modal-close" id="modalCloseBtn">&times;</div>
          <div class="modal-title">
            <span>🔐</span> MERCI, CYBER-GUERRIER·ÈRE !
          </div>
          <div class="modal-message">
            Tu as franchi une étape essentielle : <strong>connaître ses habitudes, c’est déjà se protéger.</strong><br><br>
            Chaque réponse t’a donné un feedback concret. Garde ces réflexes.
          </div>
          <div class="modal-tip">
            <strong>💡 ASTUCE HACKER ÉTHIQUE :</strong><br>
            • Utilise un gestionnaire de mots de passe (Bitwarden est gratuit et open source)<br>
            • Active la 2FA partout, surtout sur ton mail et tes réseaux<br>
            • Ne branche jamais une clé USB trouvée par terre — elle peut être piégée<br>
            • Un VPN gratuit n’existe pas : s’il est gratuit, c’est toi le produit<br>
            • Vérifie toujours l’URL avant de saisir un mot de passe : le cadenas HTTPS ne garantit pas l’identité du site
          </div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', modalHTML);
  }

  const modal = document.getElementById('thankyouModal');
  let popupShown = false;

  const checkScrollEnd = () => {
    if (popupShown) return;
    const scrollTop = window.scrollY;
    const windowHeight = window.innerHeight;
    const documentHeight = document.documentElement.scrollHeight;
    // Seuil de 50px avant le bas
    if (scrollTop + windowHeight >= documentHeight - 50) {
      if (modal) modal.classList.add('active');
      popupShown = true;
      window.removeEventListener('scroll', checkScrollEnd);
    }
  };

  window.addEventListener('scroll', checkScrollEnd);

  // Fermeture du modal
  const closeBtn = document.getElementById('modalCloseBtn');
  if (closeBtn) {
    closeBtn.onclick = () => modal.classList.remove('active');
  }
  if (modal) {
    modal.onclick = (e) => {
      if (e.target === modal) modal.classList.remove('active');
    };
  }
}

// ═══════════════════════════════════════════════════════
//  MATRIX RAIN
// ═══════════════════════════════════════════════════════
(function matrixRain() {
  const canvas = document.getElementById("matrix-bg");
  const ctx = canvas.getContext("2d");
  const chars = "アイウエオカキクケコ01アBCDEFGHIJKLMNOPQRSTUVWXYZ<>/{}[]0123456789";
  let drops = [];
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    drops = Array(Math.floor(canvas.width / 14)).fill(1);
  }
  window.addEventListener('resize', resize); resize();
  setInterval(() => {
    ctx.fillStyle = "rgba(6,13,20,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#00ff9f"; ctx.font = "13px 'Share Tech Mono', monospace";
    drops.forEach((y, i) => {
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*14, y*14);
      if (y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 55);
})();

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init() {
  let html = "";
  questions.forEach((q, i) => { html += buildQuestionHTML(q, i); });
  container.innerHTML = html;
  bindEvents();
  showQuestion(0);
  window.addEventListener('scroll', handleProgressSticky);
  handleProgressSticky(); // pour l’état initial
  updateScoreChip();
  prevBtn.addEventListener("click", prevStep);
  nextBtn.addEventListener("click", nextStep);
  document.getElementById("submitBtn")?.addEventListener("click", submitAll);
  
  // Défilement initial après chargement complet
  setTimeout(() => {
    scrollToActiveQuestion();
  }, 200);
}
init();
